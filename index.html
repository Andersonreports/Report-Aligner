<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AND-Bioinfo Report Aligner</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: #23272f;
    background: #f5f6f8;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 1.1rem 1.5rem 1rem;
    border-bottom: 1px solid #e1e4e9;
    background: #ffffff;
    text-align: center;
  }
  h1 {
    display: inline-block;
    font-size: 1.25rem;
    margin: 0;
    color: #123a5e;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    padding: 0.4rem 1rem;
    background: linear-gradient(90deg, #dfeaf5, #eef3f8);
    border-left: 4px solid #3b6ea5;
    border-radius: 4px;
  }
  select, input[type=file] {
    font-family: inherit;
    font-size: 0.9rem;
  }
  select {
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    border: 1px solid #cdd3da;
    background: #fff;
    color: #23272f;
    width: 100%;
  }
  #template-status { font-size: 0.85rem; margin-top: 0.5rem; }

  .layout {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 3fr;
    gap: 1.25rem;
    padding: 1.25rem 1.5rem;
    min-height: 0;
  }
  @media (max-width: 800px) {
    .layout { grid-template-columns: 1fr; }
  }

  .sidebar { min-width: 0; }
  .card {
    background: #ffffff;
    border: 1px solid #dfe3e8;
    border-radius: 10px;
    padding: 1.25rem 1.4rem;
    margin-bottom: 1.25rem;
  }
  .card h2 { font-size: 1rem; margin: 0 0 0.9rem; color: #2f333b; font-weight: 600; }
  label.field { display: block; margin: 0 0 0.9rem; font-size: 0.9rem; color: #4b505a; }
  input[type=file] { display: block; margin-top: 0.4rem; width: 100%; }

  .dropzone {
    position: relative;
    border: 2px dashed #cdd3da;
    border-radius: 10px;
    padding: 1.75rem 1rem;
    text-align: center;
    background: #fafbfc;
    margin-bottom: 1rem;
    transition: border-color .15s ease, background .15s ease;
  }
  .dropzone:hover, .dropzone.dragover {
    border-color: #3b6ea5;
    background: #eef3f8;
  }
  .dropzone-input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
  }
  .dropzone-content { pointer-events: none; }
  .dropzone-content svg { width: 30px; height: 30px; color: #7d8792; margin-bottom: 0.5rem; }
  .dropzone-text { margin: 0; font-size: 0.9rem; color: #4b505a; line-height: 1.4; }
  .dropzone-browse { color: #3b6ea5; text-decoration: underline; }
  .dropzone-filename {
    margin: 0.6rem 0 0;
    font-size: 0.85rem;
    color: #2f333b;
    font-weight: 600;
    word-break: break-all;
  }

  button {
    background: #3b6ea5;
    color: #ffffff;
    border: none;
    padding: 0.55rem 1.1rem;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #325f8e; }
  button:disabled { background: #c7ccd3; cursor: not-allowed; }
  .fix-btn {
    display: block;
    width: 100%;
    margin-top: 1rem;
    padding: 0.8rem 1.1rem;
    font-size: 1rem;
    font-weight: 600;
  }

  .status { margin-top: 0.6rem; font-size: 0.85rem; }
  .status.ok { color: #2f9e64; }
  .status.error { color: #d1495b; }
  .hidden { display: none !important; }

  a.download {
    display: block;
    text-align: center;
    margin-top: 0.75rem;
    background: #3b6ea5;
    color: #ffffff;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.9rem;
  }
  a.download:hover { background: #325f8e; }
  .checkbox-row { font-size: 0.82rem; color: #6b7078; display: flex; gap: 0.4rem; align-items: flex-start; }

  .preview-pane {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  .preview-toolbar {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 0.75rem;
  }
  .toggle-btn {
    background: #ffffff;
    color: #4b505a;
    border: 1px solid #cdd3da;
  }
  .toggle-btn.active {
    background: #3b6ea5;
    color: #fff;
    border-color: #3b6ea5;
  }
  .toggle-btn:disabled { background: #eef0f3; color: #a7adb6; border-color: #dfe3e8; }

  .preview-container {
    flex: 1;
    min-height: 0;
    overflow: auto;
    background: #e9ebee;
    border: 1px solid #dfe3e8;
    border-radius: 10px;
    padding: 1.5rem;
  }
  .preview-placeholder {
    color: #9aa0a8;
    text-align: center;
    margin-top: 3rem;
    font-size: 0.95rem;
  }
  .docx-wrapper { background: transparent; }
  .docx-wrapper > section.docx {
    margin-bottom: 1.5rem !important;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
  }

  footer { font-size: 0.78rem; color: #9aa0a8; text-align: center; padding: 0.75rem; }
</style>
</head>
<body>
  <header>
    <h1>AND-Bioinfo Report Aligner</h1>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="card">
        <h2>Template</h2>
        <label class="field">
          <select id="template-select"></select>
        </label>
        <div id="template-status" class="status">Loading templates...</div>
      </div>

      <div class="card">
        <h2>Report</h2>
        <div id="dropzone" class="dropzone">
          <input type="file" id="report-input" class="dropzone-input" accept=".docx">
          <div class="dropzone-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M12 4l-4 4M12 4l4 4"/><path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            <p class="dropzone-text">Drag &amp; drop your report here<br>or <span class="dropzone-browse">browse files</span></p>
            <p id="dropzone-filename" class="dropzone-filename hidden"></p>
          </div>
        </div>
        <label class="checkbox-row">
          <input type="checkbox" id="heuristic-checkbox">
          <span>Also try to fix headings that weren't tagged with a Word heading style (beta)</span>
        </label>
        <button id="fix-btn" class="fix-btn" disabled>Fix Alignment</button>
        <div id="report-status" class="status"></div>
        <a id="download-link" class="download hidden" href="#">Download fixed report</a>
      </div>
    </aside>

    <main class="preview-pane">
      <div class="preview-toolbar">
        <button id="preview-original-btn" class="toggle-btn" disabled>Original</button>
        <button id="preview-fixed-btn" class="toggle-btn" disabled>Fixed</button>
      </div>
      <div id="preview-container" class="preview-container">
        <p class="preview-placeholder">Upload a report to preview it here.</p>
      </div>
    </main>
  </div>

  <footer>Runs entirely client-side. No data leaves your device.</footer>

  <div id="preview-styles" class="hidden"></div>

  <script src="vendor/jszip.min.js"></script>
  <script src="vendor/docx-preview.min.js"></script>
  <script src="aligner.js"></script>
  <script src="app.js"></script>
</body>
</html>
