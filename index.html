<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Report Aligner</title>
<style>
  :root { color-scheme: light; }
  body {
    font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    max-width: 640px;
    margin: 3rem auto;
    padding: 0 1.25rem;
    line-height: 1.5;
    color: #3a3a38;
    background: #faf9f6;
  }
  h1 { font-size: 1.5rem; margin-bottom: 0.25rem; color: #2f2f2d; font-weight: 600; }
  p.lede { color: #85837c; margin-top: 0; }
  .card {
    background: #ffffff;
    border: 1px solid #e8e6df;
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.25rem;
  }
  .card h2 { font-size: 1.05rem; margin-top: 0; color: #4a4a46; font-weight: 600; }
  label.field { display: block; margin: 0.75rem 0; font-size: 0.95rem; color: #57564f; }
  input[type=file] { display: block; margin-top: 0.4rem; }
  button {
    background: #8a9a8e;
    color: #ffffff;
    border: none;
    padding: 0.55rem 1.1rem;
    border-radius: 6px;
    font-size: 0.95rem;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #7c8d80; }
  button:disabled { background: #d8d6cd; cursor: not-allowed; }
  .status { margin-top: 0.6rem; font-size: 0.9rem; }
  .status.ok { color: #6b8f76; }
  .status.error { color: #b56a5c; }
  .hidden { display: none; }
  a.download {
    display: inline-block;
    margin-top: 0.75rem;
    background: #8a9a8e;
    color: #ffffff;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    text-decoration: none;
    font-size: 0.9rem;
  }
  a.download:hover { background: #7c8d80; }
  .checkbox-row { font-size: 0.85rem; color: #71706a; }
  footer { font-size: 0.8rem; color: #a3a199; text-align: center; margin-top: 2rem; }
</style>
</head>
<body>
  <h1>Report Aligner</h1>
  <p class="lede">Upload a report, get it back matching your team's template formatting. Everything runs in your browser — files are never uploaded anywhere.</p>

  <div class="card">
    <h2>1. Template</h2>
    <label class="field">
      Use a different template (optional — a default may already be loaded below)
      <input type="file" id="template-input" accept=".docx">
    </label>
    <div id="template-status" class="status">Loading...</div>
  </div>

  <div class="card">
    <h2>2. Fix a report</h2>
    <label class="field">
      Report to fix
      <input type="file" id="report-input" accept=".docx">
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="heuristic-checkbox">
      Also try to fix headings that weren't tagged with a Word heading style (beta)
    </label>
    <div style="margin-top: 1rem;">
      <button id="fix-btn" disabled>Fix Alignment</button>
    </div>
    <div id="report-status" class="status"></div>
    <a id="download-link" class="download hidden" href="#">Download</a>
  </div>

  <footer>Runs entirely client-side. No data leaves your device.</footer>

  <script src="vendor/jszip.min.js"></script>
  <script src="aligner.js"></script>
  <script src="app.js"></script>
</body>
</html>
